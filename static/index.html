<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RBBC">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>RBBC — Catalogo Biblioteche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bosco:     #1a3a1c;
      --bosco-2:   #254d28;
      --bosco-3:   #0f2210;
      --oro:       #c9a84c;
      --oro-2:     #e8c96a;
      --avorio:    #f8f4ec;
      --avorio-2:  #ede7d9;
      --avorio-3:  #e0d8c8;
      --inchio:    #0f0d0a;
      --inchio-2:  #2a2520;
      --rosso:     #7a2020;
      --ombra:     rgba(15,13,10,.14);
      --ombra-2:   rgba(15,13,10,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--avorio);
      color: var(--inchio);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════
       SCHERMATA 1 — Selezione biblioteca
    ══════════════════════════════════════ */
    #s1 {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 32px;
      padding-top: calc(40px + env(safe-area-inset-top));
      background: var(--avorio);
    }

    /* Logo / intestazione */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      gap: 16px;
    }

    .brand-icon {
      width: 72px; height: 72px;
    }

    .brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--bosco);
      letter-spacing: .01em;
      text-align: center;
      line-height: 1.1;
    }
    .brand h1 span {
      display: block;
      font-weight: 400;
      font-size: 1.05rem;
      font-style: italic;
      color: #888;
      margin-top: 3px;
      letter-spacing: .02em;
    }

    /* Separatore ornamentale */
    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 360px;
    }
    .ornament-line { flex: 1; height: 1px; background: var(--avorio-3); }
    .ornament-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--oro); }

    /* Box selezione */
    .sel-box {
      width: 100%;
      max-width: 360px;
    }

    .sel-label {
      display: block;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 8px;
    }

    .ac-wrap { position: relative; }

    .ac-wrap input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      border: 1.5px solid var(--avorio-3);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      background: #fff;
      color: var(--inchio);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .ac-wrap input:focus {
      border-color: var(--bosco);
      box-shadow: 0 0 0 3px rgba(26,58,28,.1);
    }
    .ac-wrap input::placeholder { color: #bbb; }

    /* Icona lente dentro l'input */
    .ac-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      font-size: .95rem;
      pointer-events: none;
    }

    /* Dropdown */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #fff;
      border: 1.5px solid var(--bosco);
      border-radius: 8px;
      box-shadow: 0 10px 28px var(--ombra);
      max-height: 240px;
      overflow-y: auto;
      z-index: 300;
      display: none;
    }
    .dropdown.open { display: block; }

    .dd-item {
      padding: 11px 16px;
      cursor: pointer;
      font-size: .88rem;
      border-bottom: 1px solid var(--avorio-2);
      color: var(--inchio-2);
      transition: background .1s, color .1s;
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item.hl {
      background: var(--bosco);
      color: #fff;
    }
    .dd-item em { font-style: normal; font-weight: 600; }
    .dd-empty {
      padding: 13px 16px;
      font-size: .84rem;
      color: #bbb;
      font-style: italic;
    }

    /* Bottone conferma */
    .btn-ok {
      margin-top: 12px;
      width: 100%;
      padding: 13px;
      background: var(--bosco);
      color: var(--oro);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: .92rem;
      letter-spacing: .04em;
      cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-ok:disabled {
      background: var(--avorio-3);
      color: #bbb;
      cursor: default;
    }
    .btn-ok:not(:disabled):active { transform: scale(.97); }

    /* ══════════════════════════════════════
       SCHERMATA 2 — Ricerca
    ══════════════════════════════════════ */
    #s2 { display: none; flex-direction: column; flex: 1; }

    header {
      background: var(--bosco-3);
      color: #fff;
      padding: 14px 16px 12px;
      padding-top: calc(14px + env(safe-area-inset-top));
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,.35);
    }

    .hd-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
    }

    .btn-back {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      color: rgba(255,255,255,.8);
      font-size: .85rem;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background .15s;
    }
    .btn-back:active { background: rgba(255,255,255,.2); }

    .hd-testi { flex: 1; min-width: 0; }
    .hd-testi h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
      letter-spacing: .01em;
    }
    .hd-testi p {
      font-size: .63rem;
      color: var(--oro);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 1px;
      font-weight: 500;
    }

    /* Search bar */
    .sb { display: flex; gap: 8px; }
    .sb input {
      flex: 1;
      padding: 10px 13px;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      background: rgba(255,255,255,.12);
      color: #fff;
      outline: none;
      transition: background .2s;
      border: 1px solid rgba(255,255,255,.12);
    }
    .sb input:focus {
      background: rgba(255,255,255,.18);
      border-color: var(--oro);
    }
    .sb input::placeholder { color: rgba(255,255,255,.4); }

    .btn-cerca {
      padding: 10px 16px;
      background: var(--oro);
      color: var(--bosco-3);
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: .85rem;
      letter-spacing: .03em;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-cerca:active { transform: scale(.96); }
    .btn-cerca:disabled { opacity: .5; cursor: default; }

    /* Main content */
    main {
      flex: 1;
      padding: 20px 16px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    /* Stato vuoto */
    .vuoto {
      text-align: center;
      padding: 60px 20px;
    }
    .vuoto svg { opacity: .2; margin-bottom: 20px; }
    .vuoto h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--inchio-2);
      margin-bottom: 8px;
    }
    .vuoto p { font-size: .84rem; color: #aaa; line-height: 1.6; }

    /* Loading */
    .loading { text-align: center; padding: 60px 20px; }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid var(--avorio-3);
      border-top-color: var(--bosco);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: .82rem; color: #aaa; font-style: italic; }

    /* Info ricerca */
    .info-q {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--avorio-3);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .info-q h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--inchio-2);
    }
    .info-q h2 strong { font-style: normal; font-weight: 600; color: var(--inchio); }
    .info-q .badge {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: var(--bosco);
      color: var(--oro);
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Card libro */
    .card {
      background: #fff;
      border-radius: 0 8px 8px 0;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px var(--ombra-2);
      overflow: hidden;
      animation: slideUp .22s ease both;
      /* Effetto segnalibro: bordo sinistro colorato */
      border-left: 4px solid var(--avorio-3);
      transition: border-left-color .2s;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
    .card.disponibile { border-left-color: var(--bosco); }
    .card.in-prestito  { border-left-color: var(--oro); }

    .card-head {
      padding: 13px 15px 10px;
    }
    .card-titolo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--inchio);
      margin-bottom: 3px;
    }
    .card-autore {
      font-size: .78rem;
      color: #888;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: .9rem;
    }

    /* Copie */
    .card-copie {
      background: var(--avorio);
      border-top: 1px solid var(--avorio-2);
      padding: 8px 15px;
    }
    .assente-label {
      font-size: .76rem;
      color: #bbb;
      font-style: italic;
    }

    .copia-riga {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 5px 0;
      border-bottom: 1px solid var(--avorio-2);
    }
    .copia-riga:last-child { border-bottom: none; }

    .copia-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .dot-v { background: var(--bosco); }
    .dot-r { background: var(--rosso); }
    .dot-o { background: var(--oro); }

    .copia-body { flex: 1; }
    .copia-coll {
      font-size: .78rem;
      font-weight: 600;
      color: var(--inchio-2);
      letter-spacing: .02em;
    }
    .copia-inv {
      font-size: .7rem;
      color: #bbb;
      margin-left: 5px;
      font-weight: 400;
    }
    .copia-stato { font-size: .78rem; color: #666; }
    .copia-rientra { font-size: .7rem; color: #bbb; }

    .card-link {
      display: block;
      text-align: right;
      padding: 6px 15px 8px;
      font-size: .7rem;
      color: var(--bosco-2);
      text-decoration: none;
      background: var(--avorio);
      border-top: 1px solid var(--avorio-2);
      letter-spacing: .03em;
    }
    .card-link:hover { color: var(--bosco); text-decoration: underline; }

    /* Errore */
    .errore {
      background: #fff5f5;
      border-left: 4px solid var(--rosso);
      border-radius: 0 8px 8px 0;
      padding: 14px 16px;
      font-size: .84rem;
      color: var(--rosso);
    }

    footer {
      text-align: center;
      padding: 14px 16px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      font-size: .65rem;
      color: #ccc;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
  </style>
</head>

<!-- ════════ S1: scelta biblioteca ════════ -->
<div id="s1">
  <div class="brand">

      <line x1="14" y1="40" x2="28" y2="42"   stroke="#c9a84c" stroke-width=".9" stroke-linecap="round" opacity=".5"/>
      <!-- Righe testo pagina destra -->
      <line x1="58" y1="25" x2="41" y2="27.5" stroke="#c9a84c" stroke-width=".9" stroke-linecap="round" opacity=".7"/>
      <line x1="58" y1="30" x2="41" y2="32.5" stroke="#c9a84c" stroke-width=".9" stroke-linecap="round" opacity=".7"/>
      <line x1="58" y1="35" x2="41" y2="37.5" stroke="#c9a84c" stroke-width=".9" stroke-linecap="round" opacity=".7"/>
      <line x1="58" y1="40" x2="44" y2="42"   stroke="#c9a84c" stroke-width=".9" stroke-linecap="round" opacity=".5"/>
    </svg>

    <h1>Catalogo RBBC
      <span>Rete Bibliotecaria Bresciana e Cremonese</span>
    </h1>
  </div>

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
  </div>

  <div class="sel-box">
    <span class="sel-label">La tua biblioteca</span>
    <div class="ac-wrap">
      <span class="ac-icon">🔍</span>
      <input type="text" id="ib"
             placeholder="Es. Rezzato, Brescia, Chiari…"
             autocomplete="off" autocorrect="off"
             autocapitalize="words" spellcheck="false">
      <div class="dropdown" id="dd"></div>
    </div>
    <button class="btn-ok" id="btnOk" disabled>
      <span>Inizia a cercare</span>
      <span>→</span>
    </button>
  </div>
</div>

<!-- ════════ S2: ricerca ════════ -->
<div id="s2">
  <header>
    <div class="hd-top">
      <button class="btn-back" id="btnBack">←</button>
      <div class="hd-testi">
        <h1 id="hdNome">Biblioteca</h1>
        <p>RBBC · Catalogo</p>
      </div>
    </div>
    <div class="sb">
      <input type="search" id="it"
             placeholder="Cerca un titolo…"
             autocomplete="off" autocorrect="off"
             enterkeyhint="search">
      <button class="btn-cerca" id="btnCerca">Cerca</button>
    </div>
  </header>

  <main id="main">
    <div class="vuoto">
      <svg width="56" height="56" viewBox="0 0 72 72" fill="none">
        <path d="M8 14 C8 12 10 11 12 11.5 L34 17 L34 58 L12 52 C10 51.5 8 50 8 48 Z" fill="#1a3a1c"/>
        <path d="M64 14 C64 12 62 11 60 11.5 L38 17 L38 58 L60 52 C62 51.5 64 50 64 48 Z" fill="#1a3a1c"/>
        <line x1="36" y1="16" x2="36" y2="58" stroke="#c9a84c" stroke-width="1.5"/>
      </svg>
      <h2>Cerca un libro</h2>
      <p id="vuoto-hint">Digita il titolo per verificare la disponibilità.</p>
    </div>
  </main>

  <footer>opac.provincia.brescia.it</footer>
</div>

  "Roè Volciano","Romanengo","Roncadelle","Rovato","Rudiano","Sabbio Chiese",
  "Sale Marasino","Salò","San Bassano","San Daniele Po","San Felice Del Benaco",
  "San Gervasio Bresciano","San Giovanni In Croce","San Paolo","San Zeno Naviglio",
  "Sarezzo","Saviore Dell'Adamello","Sellero","Seniga","Sergnano","Serle",
  "Sesto Ed Uniti","Sirmione","Soiano Del Lago","Solarolo Rainerio","Soncino",
  "Sonico","Soresina","Sospiro","Spino D'Adda","Sulzano","Tavernole Sul Mella",
  "Temù","Tignale","Torbole Casaglia","Tornata","Torre De' Picenardi",
  "Torricella Del Pizzo","Toscolano Maderno","Travagliato","Tremosine",

];

/* ── Autocomplete ── */
const ib = document.getElementById('ib');
const dd = document.getElementById('dd');
const btnOk = document.getElementById('btnOk');
let scelta = null, iHov = -1;

const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[''`]/g,"'");

function highlight(nome, q) {
  const i = norm(nome).indexOf(norm(q));
  if (i < 0 || !q) return nome;
  return nome.slice(0,i) + '<em>' + nome.slice(i, i+q.length) + '</em>' + nome.slice(i+q.length);
}

function apriDd(lista, q) {
  dd.innerHTML = '';
  iHov = -1;
  if (!lista.length) {
    dd.innerHTML = '<div class="dd-empty">Nessuna biblioteca trovata</div>';
  } else {
    lista.slice(0,12).forEach(n => {
      const d = document.createElement('div');
      d.className = 'dd-item';
      d.innerHTML = highlight(n, q);
      d.addEventListener('mousedown', e => { e.preventDefault(); scegli(n); });
      dd.appendChild(d);
    });
  }
  dd.classList.add('open');
}

function chiudiDd() { dd.classList.remove('open'); iHov = -1; }

function scegli(n) {
  scelta = n; ib.value = n;
  chiudiDd(); btnOk.disabled = false; btnOk.focus();
}

ib.addEventListener('input', () => {
  const q = ib.value.trim();
  scelta = null; btnOk.disabled = true;
  if (!q) { chiudiDd(); return; }
  const nq = norm(q);
  const ini = BIBS.filter(n => norm(n).startsWith(nq));
  const con = BIBS.filter(n => !norm(n).startsWith(nq) && norm(n).includes(nq));
  apriDd([...ini, ...con], q);
});

ib.addEventListener('keydown', e => {
  const items = dd.querySelectorAll('.dd-item');
  if (!dd.classList.contains('open')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); iHov = Math.min(iHov+1, items.length-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); iHov = Math.max(iHov-1, 0); }
  else if (e.key === 'Enter' && iHov >= 0) { e.preventDefault(); scegli(items[iHov].textContent); return; }
  else if (e.key === 'Escape') { chiudiDd(); return; }
  items.forEach((el,i) => el.classList.toggle('hl', i === iHov));
});

document.addEventListener('click', e => { if (!e.target.closest('.ac-wrap')) chiudiDd(); });

/* ── Transizioni ── */
const s1 = document.getElementById('s1');
const s2 = document.getElementById('s2');

btnOk.addEventListener('click', () => {
  if (!scelta) return;
  document.getElementById('hdNome').textContent = scelta;
  document.getElementById('vuoto-hint').textContent =
    `Digita il titolo per verificare la disponibilità a ${scelta}.`;
  s1.style.display = 'none';
  s2.style.display = 'flex';
  document.getElementById('it').focus();
});

document.getElementById('btnBack').addEventListener('click', () => {
  s2.style.display = 'none';
  s1.style.display = 'flex';
  document.getElementById('main').innerHTML = `
    <div class="vuoto">
      <svg width="56" height="56" viewBox="0 0 72 72" fill="none">
        <path d="M8 14 C8 12 10 11 12 11.5 L34 17 L34 58 L12 52 C10 51.5 8 50 8 48 Z" fill="#1a3a1c"/>
        <path d="M64 14 C64 12 62 11 60 11.5 L38 17 L38 58 L60 52 C62 51.5 64 50 64 48 Z" fill="#1a3a1c"/>
        <line x1="36" y1="16" x2="36" y2="58" stroke="#c9a84c" stroke-width="1.5"/>
      </svg>
      <h2>Cerca un libro</h2>
      <p>Digita il titolo per verificare la disponibilità.</p>
    </div>`;
});

/* ── Ricerca ── */
const it = document.getElementById('it');
const btnCerca = document.getElementById('btnCerca');
const main = document.getElementById('main');

function statoC(copie) {
  if (!copie?.length) return 'assente';
  const ss = copie.map(c => c.stato.toLowerCase());
  if (ss.some(s => s.includes('scaffale') || s.includes('disponib'))) return 'disponibile';
  if (ss.some(s => s.includes('prestito'))) return 'in-prestito';
  return 'assente';
}
function dotC(stato) {
  const s = stato.toLowerCase();
  if (s.includes('scaffale') || s.includes('disponib')) return 'dot-v';
  if (s.includes('prestito')) return 'dot-r';
  return 'dot-o';
}

function renderRis(data) {
  const { query, biblioteca, risultati } = data;
  if (!risultati?.length) {
    main.innerHTML = `
      <div class="vuoto">
        <svg width="56" height="56" viewBox="0 0 72 72" fill="none">
          <path d="M8 14 C8 12 10 11 12 11.5 L34 17 L34 58 L12 52 C10 51.5 8 50 8 48 Z" fill="#1a3a1c"/>
          <path d="M64 14 C64 12 62 11 60 11.5 L38 17 L38 58 L60 52 C62 51.5 64 50 64 48 Z" fill="#1a3a1c"/>
          <line x1="36" y1="16" x2="36" y2="58" stroke="#c9a84c" stroke-width="1.5"/>
        </svg>
        <h2>Nessun risultato</h2>
        <p>Nessun libro trovato per <em>"${query}"</em>.</p>
      </div>`;
    return;
  }

  const nBib = risultati.filter(r => r.copie_rezzato?.length).length;
  let html = `
    <div class="info-q">
      <h2>«<strong>${query}</strong>»</h2>
      <span class="badge">${nBib}/${risultati.length} a ${biblioteca}</span>
    </div>`;

  risultati.forEach((libro, idx) => {
    const cl = statoC(libro.copie_rezzato);
    const au = libro.autore && libro.autore !== '—' ? libro.autore : '';
    let copieH = '';

    if (!libro.copie_rezzato?.length) {
      copieH = `<div class="card-copie"><span class="assente-label">Non presente a ${biblioteca}</span></div>`;
    } else {
      const righe = libro.copie_rezzato.map(c => `
        <div class="copia-riga">
          <div class="copia-dot ${dotC(c.stato)}"></div>
          <div class="copia-body">
            <div><span class="copia-coll">${c.collocazione}</span><span class="copia-inv">${c.inventario}</span></div>
            <div class="copia-stato">${c.stato}</div>
            ${c.rientra ? `<div class="copia-rientra">Rientra: ${c.rientra}</div>` : ''}
          </div>
        </div>`).join('');
      copieH = `<div class="card-copie">${righe}</div>`;
    }

    html += `
      <div class="card ${cl}" style="animation-delay:${idx*.04}s">
        <div class="card-head">
          <div class="card-titolo">${libro.titolo}</div>
          ${au ? `<div class="card-autore">${au}</div>` : ''}
        </div>
        ${copieH}
        <a class="card-link" href="${libro.url}" target="_blank" rel="noopener">Apri nel catalogo →</a>
      </div>`;
  });

  main.innerHTML = html;
}

async function cerca() {
  const q = it.value.trim();
  if (!q || !scelta) return;
  main.innerHTML = `<div class="loading"><div class="spinner"></div><p>Cerco nell'OPAC…</p></div>`;
  btnCerca.disabled = true; btnCerca.textContent = '…';
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&biblioteca=${encodeURIComponent(scelta)}`);
    if (!r.ok) throw new Error(`Errore ${r.status}`);
    renderRis(await r.json());
  } catch (err) {
    main.innerHTML = `<div class="errore">⚠ ${err.message} — riprova tra qualche secondo.</div>`;
  } finally {
    btnCerca.disabled = false; btnCerca.textContent = 'Cerca';
  }
}

btnCerca.addEventListener('click', cerca);
it.addEventListener('keydown', e => { if (e.key === 'Enter') cerca(); });
</script>
